name: smartbin_mobile
description: SmartBin waste management mobile application
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.7
  
  # HTTP & API
  http: ^1.2.2
  dio: ^5.5.0
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # MQTT for real-time notifications
  mqtt_client: ^10.5.0
  
  # UI Components
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0
  
  # Icons (premium look)
  font_awesome_flutter: ^10.8.0
  
  # Maps and Location
  geolocator: ^13.0.1
  flutter_map: ^8.2.0
  latlong2: ^0.9.0
  open_route_service: ^1.2.7
  url_launcher: ^6.3.0
  path_provider: ^2.1.5
  open_file: ^3.5.4
  
  # Icons
  cupertino_icons: ^1.0.8
  
  # Utilities
  intl: ^0.18.1
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/reference/